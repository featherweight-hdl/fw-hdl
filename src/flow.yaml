# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json
fragment:
  name: src

  tasks:
  # Core featherweight (fw) modeling-library source. The package pulls in the
  # class .svh files via the include dir; the interface modules are listed
  # explicitly so the library elaborates standalone. EXPORTED so other packages
  # (protocol kits, apps) can depend on it as `fw-hdl.src.sv-src` after importing
  # fw-hdl. incdir '.' is srcdir-relative, so it stays correct when imported.
  - export: sv-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      include:
      - fw_hdl_pkg.sv
      - fw_clock_xtor_if.sv
      - fw_put_xtor_if.sv
      - fw_root.sv
      incdirs:
      - .