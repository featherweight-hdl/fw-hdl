
# yaml-language-server: $schema=https://dv-flow.github.io/flow.dv.schema.json

package:
  name: examples

  tasks:
  - name: fw-src
    uses: std.FileSet
    with:
      type: systemVerilogSource
      base: ${{ rootdir }}/../src
      include:
      - fw_pkg.sv
      - fw_clock_xtor_if.sv
      - fw_put_xtor_if.sv
      incdirs:
      - .
  - name: src
    uses: std.FileSet
    needs: [fw-src]
    with:
      type: systemVerilogSource
      include:
      - "*.sv"

  - name: sim-img
    uses: hdlsim.vlt.SimImage
    needs: [src]
    with:
      top: [counter_tb]
  - root: sim
    uses: hdlsim.vlt.SimRun
    needs: [sim-img]

    
