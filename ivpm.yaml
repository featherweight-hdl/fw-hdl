package:
  name: fw-hdl
  with:
    agents:
      claude: true

  dep-sets:
  - name: default-dev
    deps: 
    - name: verilator
      url: https://github.com/edapack/verilator-bin
      src: gh-rls
      cache: true
    - name: yosys
      url: https://github.com/edapack/yosys-bin
      src: gh-rls
      cache: true
    - name: dv-flow-mgr
      url: https://github.com/dv-flow/dv-flow-mgr.git
    - name: dv-flow-libhdlsim
      url: https://github.com/dv-flow/dv-flow-libhdlsim.git
    # Provides the formal.sby.* tasks used by tests/formal/flow.yaml. Declared
    # so the package definition resolves in CI / fresh checkouts (it was
    # previously only available via a local editable install).
    - name: dv-flow-libformal
      url: https://github.com/dv-flow/dv-flow-libformal.git
