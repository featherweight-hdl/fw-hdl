name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install IVPM, restore its content-addressed cache, and run
      # `ivpm update` to populate ./packages (dv-flow-mgr, dv-flow-libhdlsim,
      # and the Verilator/Yosys EDA toolchains) from the default-dev dep-set.
      - name: Setup IVPM + dependencies
        uses: fvutils/ivpm-setup@v1
        with:
          dep-set: default-dev

      # The EDA toolchains publish `export.envrc` files; the project-root
      # `.envrc` sources packages/packages.envrc to put dfm, Verilator and
      # Yosys on PATH. direnv activates that environment for `direnv exec`.
      - name: Enable direnv
        run: |
          sudo apt-get update && sudo apt-get install -y direnv
          direnv allow .

      - name: Run simulation tests
        run: |
          direnv exec . dfm run fw-hdl.tests.smoke
          direnv exec . dfm run fw-hdl.intf_pc.intf-pc
          direnv exec . dfm run fw-hdl.rv_proto.rv-proto
